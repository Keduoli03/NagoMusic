name: build-release

on:
  push:
    branches:
      - main
      - master
    paths:
      - pubspec.yaml

permissions:
  contents: write

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - run: flutter pub get
      - run: flutter build apk --release --split-per-abi
      - run: |
          VERSION=$(grep '^version:' pubspec.yaml | awk '{print $2}')
          TAG=${VERSION/+/-}
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "TAG=$TAG" >> $GITHUB_ENV
      - run: |
          mv build/app/outputs/flutter-apk/app-arm64-v8a-release.apk nagomusic-v${VERSION}-arm64-v8a.apk
          mv build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk nagomusic-v${VERSION}-armeabi-v7a.apk
          mv build/app/outputs/flutter-apk/app-x86_64-release.apk nagomusic-v${VERSION}-x86_64.apk
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.TAG }}
          name: v${{ env.TAG }}
          files: |
            nagomusic-v${{ env.VERSION }}-arm64-v8a.apk
            nagomusic-v${{ env.VERSION }}-armeabi-v7a.apk
            nagomusic-v${{ env.VERSION }}-x86_64.apk
          generate_release_notes: true
